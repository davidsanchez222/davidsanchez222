name: Update PR lists

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Update README PR sections
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const username = "davidsanchez222";

            async function searchPRs(query) {
              const results = await github.paginate(
                github.rest.search.issuesAndPullRequests,
                {
                  q: query,
                  per_page: 100,
                }
              );
              return results.filter(item => item.pull_request);
            }

            const openQuery = `is:pr is:open author:${username}`;
            const mergedQuery = `is:pr is:merged author:${username}`;

            const openPRs = await searchPRs(openQuery);
            const mergedPRs = await searchPRs(mergedQuery);

            function formatPR(pr) {
              const repo = pr.repository_url.replace("https://api.github.com/repos/", "");
              return `- [${pr.title}](${pr.html_url}) — \`${repo}\``;
            }

            const openSection =
              openPRs.length
                ? openPRs
                    .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
                    .slice(0, 10)
                    .map(formatPR)
                    .join("\n")
                : "_No open PRs right now._";

            const mergedSection =
              mergedPRs.length
                ? mergedPRs
                    .sort((a, b) => new Date(b.closed_at) - new Date(a.closed_at))
                    .slice(0, 10)
                    .map(formatPR)
                    .join("\n")
                : "_No merged PRs found._";

            const readmePath = "README.md";
            let readme = fs.readFileSync(readmePath, "utf8");

            const startOpen = "<!-- OPEN_PRS_START -->";
            const endOpen = "<!-- OPEN_PRS_END -->";
            const startMerged = "<!-- MERGED_PRS_START -->";
            const endMerged = "<!-- MERGED_PRS_END -->";

            function replaceSection(content, start, end, replacement) {
              const regex = new RegExp(
                `${start}[\\s\\S]*?${end}`,
                "m"
              );
              return content.replace(regex, `${start}\n${replacement}\n${end}`);
            }

            readme = replaceSection(readme, startOpen, endOpen, openSection);
            readme = replaceSection(readme, startMerged, endMerged, mergedSection);

            fs.writeFileSync(readmePath, readme);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update PR lists"

      - name: Push changes
        run: git push
